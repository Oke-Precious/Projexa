<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Forgot Password - Master Build</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#ffffff",
                        "background": "#f8f9ff",
                        "tertiary-fixed-dim": "#4cd7f6",
                        "on-error-container": "#93000a",
                        "outline": "#767586",
                        "primary-fixed-dim": "#c0c1ff",
                        "secondary-fixed-dim": "#d0bcff",
                        "on-tertiary-container": "#f9fdff",
                        "on-background": "#0b1c30",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#4648d4",
                        "tertiary-fixed": "#acedff",
                        "primary-container": "#6063ee",
                        "tertiary-container": "#008096",
                        "surface-dim": "#cbdbf5",
                        "error": "#ba1a1a",
                        "tertiary": "#006577",
                        "on-tertiary-fixed": "#001f26",
                        "surface-bright": "#f8f9ff",
                        "on-secondary-container": "#fffbff",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "inverse-surface": "#213145",
                        "on-secondary-fixed": "#23005c",
                        "on-error": "#ffffff",
                        "surface-container": "#e5eeff",
                        "secondary-container": "#8455ef",
                        "surface-container-highest": "#d3e4fe",
                        "surface-variant": "#d3e4fe",
                        "surface-tint": "#494bd6",
                        "outline-variant": "#c7c4d7",
                        "on-primary-fixed": "#07006c",
                        "on-tertiary-fixed-variant": "#004e5c",
                        "on-primary-container": "#fffbff",
                        "on-surface": "#0b1c30",
                        "primary-fixed": "#e1e0ff",
                        "on-secondary-fixed-variant": "#5516be",
                        "surface": "#f8f9ff",
                        "secondary": "#6b38d4",
                        "on-tertiary": "#ffffff",
                        "surface-container-low": "#eff4ff",
                        "on-surface-variant": "#464554",
                        "surface-container-high": "#dce9ff",
                        "error-container": "#ffdad6",
                        "secondary-fixed": "#e9ddff",
                        "on-primary": "#ffffff",
                        "inverse-primary": "#c0c1ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Custom styles from Design System constraints */
        .ambient-shadow {
            box-shadow: 0 32px 48px -4px rgba(11, 28, 48, 0.06);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #4648d4 0%, #6063ee 100%);
        }
    </style>
</head>

<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-4">
    <!-- Auth Card Container -->
    <main class="w-full max-w-md bg-surface-container-lowest rounded-xl ambient-shadow p-8 relative overflow-hidden">
        <!-- Subtle decorative glow (optional, adds to premium feel without borders) -->
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-primary-container opacity-80">
        </div>
        <!-- Logo / Brand Anchor -->
        <div class="flex flex-col items-center justify-center mb-8">
            <div class="flex items-center justify-center md:mb-4">
                <img src="./media/projexalgo.png" alt="" class="h-8" srcset="">
            </div>
            <h1 class="font-headline text-3xl font-bold tracking-[-0.02em] text-on-surface">Forgot Password?</h1>
            <p class="font-body text-sm text-on-surface-variant text-center mt-2 px-4 leading-relaxed">
                Enter your email address and we'll send you a link to reset your password.
            </p>
        </div>
        <!-- Form -->
        <form action="#" class="space-y-6" method="POST">
            <!-- Email Field -->
            <div class="space-y-2">
                <label
                    class="font-label text-[0.6875rem] font-medium text-on-surface-variant block uppercase tracking-wider"
                    for="email">Email Address</label>
                <div class="relative">
                    <div
                        class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant/50">
                        <span class="material-symbols-outlined text-[1.25rem]">mail</span>
                    </div>
                    <!-- Soft Focus Input Styling -->
                    <input
                        class="block w-full pl-10 pr-3 py-3 bg-surface-container-highest border-0 rounded-lg text-sm font-body text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary/40 focus:bg-primary-fixed focus:outline-none transition-all duration-200"
                        id="email" name="email" placeholder="name@company.com" required="" type="email" />
                </div>
            </div>
            <!-- Primary Action -->
            <button
                class="w-full btn-gradient text-on-primary font-body font-medium text-sm rounded-xl py-3.5 hover:scale-[1.02] active:scale-[0.98] transition-transform duration-200 flex items-center justify-center gap-2 shadow-sm"
                type="submit">
                Send Reset Link
                <span class="material-symbols-outlined text-lg"
                    style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
            </button>
        </form>
        <!-- Secondary Action -->
        <div class="mt-8 text-center">
            <a class="inline-flex items-center gap-1.5 font-body text-sm text-on-surface-variant hover:text-primary transition-colors duration-200"
                href="./signin.html">
                <span class="material-symbols-outlined text-[1rem]">arrow_back</span>
                Back to Sign In
            </a>
        </div>
    </main>
</body>

</html>
