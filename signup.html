<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Projexa - Sign Up</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#767586",
                        "on-secondary-container": "#fffbff",
                        "on-secondary-fixed": "#23005c",
                        "on-tertiary-container": "#f9fdff",
                        "on-tertiary-fixed": "#001f26",
                        "secondary-fixed-dim": "#d0bcff",
                        "on-error-container": "#93000a",
                        "surface-container": "#e5eeff",
                        "tertiary-fixed": "#acedff",
                        "surface-container-low": "#eff4ff",
                        "surface-container-highest": "#d3e4fe",
                        "surface-tint": "#494bd6",
                        "background": "#f8f9ff",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#eaf1ff",
                        "error": "#ba1a1a",
                        "on-error": "#ffffff",
                        "primary-fixed": "#e1e0ff",
                        "primary-container": "#6063ee",
                        "surface-variant": "#d3e4fe",
                        "on-tertiary": "#ffffff",
                        "on-surface": "#0b1c30",
                        "surface": "#f8f9ff",
                        "on-primary": "#ffffff",
                        "surface-dim": "#cbdbf5",
                        "secondary-fixed": "#e9ddff",
                        "on-primary-fixed": "#07006c",
                        "surface-bright": "#f8f9ff",
                        "surface-container-high": "#dce9ff",
                        "on-primary-container": "#fffbff",
                        "tertiary-fixed-dim": "#4cd7f6",
                        "inverse-primary": "#c0c1ff",
                        "secondary-container": "#8455ef",
                        "on-surface-variant": "#464554",
                        "on-background": "#0b1c30",
                        "tertiary-container": "#008096",
                        "primary": "#4648d4",
                        "on-secondary": "#ffffff",
                        "tertiary": "#006577",
                        "secondary": "#6b38d4",
                        "outline-variant": "#c7c4d7",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#5516be",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "inverse-surface": "#213145",
                        "primary-fixed-dim": "#c0c1ff",
                        "on-tertiary-fixed-variant": "#004e5c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": [
                            "Inter"
                        ],
                        "body": [
                            "Inter"
                        ],
                        "label": [
                            "Inter"
                        ]
                    }
                },
            },
        }
    </script>
</head>

<body class="bg-background text-on-surface font-body antialiased min-h-screen flex items-center justify-center p-6">
    <!-- Main Container -->
    <main
        class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0_32px_48px_-4px_rgba(11,28,48,0.06)] relative overflow-hidden z-10 p-10 flex flex-col items-center">
        <!-- Subtle Glow Effect Behind Form -->
        <div class="absolute -top-32 -left-32 w-64 h-64 bg-primary/10 rounded-full blur-3xl z-0 pointer-events-none">
        </div>
        <div
            class="absolute -bottom-32 -right-32 w-64 h-64 bg-secondary/10 rounded-full blur-3xl z-0 pointer-events-none">
        </div>
        <!-- Content Wrapper (z-10 ensures it sits above the glows) -->
        <div class="w-full relative z-10 flex flex-col items-center">
            <!-- Brand Logo & Header -->
            <div class="mb-10 flex flex-col items-center text-center">
                <a href="index.html"
                    class="flex items-center justify-center md:mb-4">
                    <img src="./media/projexalgo.png" alt="" class = "h-12" srcset="">  
                </a>
                <h1 class="font-headline text-headline-lg font-bold tracking-tight text-on-surface mb-2"
                    style="font-size: 2rem; letter-spacing: -0.02em;">Get started</h1>
                <p class="font-body text-body-md text-on-surface-variant" style="font-size: 0.875rem;">Create a new
                    account for Master Build.</p>
            </div>
            <!-- Sign Up Form -->
            <form class="w-full flex flex-col gap-5">
                <!-- Full Name Input -->
                <div class="flex flex-col gap-1.5">
                    <label
                        class="font-label text-[0.6875rem] font-medium text-on-surface-variant uppercase tracking-wider pl-1"
                        for="fullName">Full Name</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none"
                            style="font-size: 1.25rem;">person</span>
                        <input
                            class="w-full bg-surface-container-highest border-none rounded-lg py-3.5 pl-12 pr-4 text-on-surface text-body-md placeholder-outline focus:ring-2 focus:ring-primary/40 focus:bg-primary-fixed focus:outline-none transition-all"
                            id="fullName" placeholder="Jane Doe" required="" type="text" />
                    </div>
                </div>
                <!-- Email Input -->
                <div class="flex flex-col gap-1.5">
                    <label
                        class="font-label text-[0.6875rem] font-medium text-on-surface-variant uppercase tracking-wider pl-1"
                        for="email">Email Address</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none"
                            style="font-size: 1.25rem;">mail</span>
                        <input
                            class="w-full bg-surface-container-highest border-none rounded-lg py-3.5 pl-12 pr-4 text-on-surface text-body-md placeholder-outline focus:ring-2 focus:ring-primary/40 focus:bg-primary-fixed focus:outline-none transition-all"
                            id="email" placeholder="jane@example.com" required="" type="email" />
                    </div>
                </div>
                <!-- Password Input -->
                <div class="flex flex-col gap-1.5">
                    <label
                        class="font-label text-[0.6875rem] font-medium text-on-surface-variant uppercase tracking-wider pl-1"
                        for="password">Password</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none"
                            style="font-size: 1.25rem;">lock</span>
                        <input
                            class="w-full bg-surface-container-highest border-none rounded-lg py-3.5 pl-12 pr-4 text-on-surface text-body-md placeholder-outline focus:ring-2 focus:ring-primary/40 focus:bg-primary-fixed focus:outline-none transition-all"
                            id="password" placeholder="••••••••" required="" type="password" />
                        <button
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface transition-colors focus:outline-none"
                            type="button">
                            <span class="material-symbols-outlined" style="font-size: 1.25rem;">visibility_off</span>
                        </button>
                    </div>
                </div>
                <!-- Terms & Conditions Checkbox -->
                <div class="flex items-start gap-3 mt-1">
                    <div class="flex items-center h-5">
                        <input
                            class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary/40 focus:ring-2 bg-surface-container-highest transition-all cursor-pointer"
                            id="terms" required="" type="checkbox" />
                    </div>
                    <label
                        class="font-body text-body-md text-on-surface-variant text-[0.875rem] leading-tight cursor-pointer"
                        for="terms">
                        I agree to the <a
                            class="text-primary font-medium hover:text-primary-container transition-colors"
                            href="#">Terms of Service</a> and <a
                            class="text-primary font-medium hover:text-primary-container transition-colors"
                            href="#">Privacy Policy</a>.
                    </label>
                </div>
                <!-- Primary Action Button -->
                <button
                    class="w-full mt-4 bg-gradient-to-br from-primary to-primary-container text-on-primary rounded-xl py-4 font-headline font-semibold text-[1rem] shadow-md hover:scale-[1.02] hover:shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2"
                    type="submit">
                    Create Account
                    <span class="material-symbols-outlined" style="font-size: 1.25rem;">arrow_forward</span>
                </button>
            </form>
            <!-- Divider -->
            <div class="w-full flex items-center my-8">
                <div class="flex-grow h-[1px] bg-outline-variant/30"></div>
                <span class="mx-4 font-label text-[0.6875rem] text-outline uppercase tracking-wider font-medium">Or
                    continue with</span>
                <div class="flex-grow h-[1px] bg-outline-variant/30"></div>
            </div>
            <!-- Social Logins -->
            <div class="w-full flex gap-4">
                <button
                    class="flex-1 bg-surface-container-highest text-on-surface rounded-xl py-3.5 font-medium text-[0.875rem] hover:bg-surface-container-high transition-colors flex items-center justify-center gap-2 border-[1px] border-outline-variant/15"
                    type="button">
                    <img alt="Google Logo" class="w-5 h-5"
                        src="https://lh3.googleusercontent.com/COxitqgJr1sJnIDe8-jiKhxDx1FrYbtRHKJ9z_hELisAlapwE9LUPh6fcXIfb5vwpbMl4xl9H9TRFPc5NOO8Sb3VSgIBrfRYvW6cUA" />
                    Google
                </button>
                <button
                    class="flex-1 bg-surface-container-highest text-on-surface rounded-xl py-3.5 font-medium text-[0.875rem] hover:bg-surface-container-high transition-colors flex items-center justify-center gap-2 border-[1px] border-outline-variant/15"
                    type="button">
                    <svg class="w-5 h-5 mr-2.5 text-[#24292F]" fill="currentColor" viewbox="0 0 24 24">
                        <path clip-rule="evenodd"
                            d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"
                            fill-rule="evenodd"></path>
                    </svg>
                    GitHub
                </button>
            </div>
            <!-- Switch to Sign In -->
            <p class="mt-8 font-body text-body-md text-on-surface-variant text-[0.875rem]">
                Already have an account?
                <a class="text-primary font-semibold hover:text-primary-container transition-colors ml-1" href="./signin.html">Sign
                    In</a>
            </p>
        </div>
    </main>

    <script src="api.js"></script>
    <script src="auth.js"></script>
</body>

</html>
